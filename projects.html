      /* تنسيق القسم بالكامل */
.process-section {
  padding: 80px 0;
  text-align: center;
  font-family: sans-serif;

  position: relative;
}

.process-title h2 {
  font-size: 32px;
  color: #111;
  margin: 5px 0 15px;
}

.process-container {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  max-width: 1100px;
  margin: 60px auto 0;
  position: relative; /* ضروري عشان الـ SVG يركب صح */
  padding: 0 50px;
}

/* تنسيق عناصر الخطوات */
.step-item {
  flex: 1;
  z-index: 2; /* عشان تطلع فوق الخط */
  padding: 0 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.icon-wrapper {
  width: 220px;
  height: 220px;
  background: #f0efef; /* اللون الأزرق اللي اخترناه من الفوتر */
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 28px;
  margin-bottom: 25px;
  border: 4px solid #0c0c0c;
}

.icon-wrapper:hover{
  transform: scale(1.1);
  transition: transform 0.1s ease;
  cursor: pointer
}

/* التحكم بالـ SVG وحركته */
.wave-line {
  position: absolute;
  top: 20px; /* يخلي الخط يمر بنص الأيقونات بالظبط */
  left: 10%;
  width: 80%;
  height: 200px;
  z-index: 1;
  fill: none;
}

.wave-line path {
  stroke: #000000; /* لون الخط */
  stroke-width: 3px; /* سمك الخط */
  stroke-dasharray: 6, 6; /* يخليه منقط (طول النقطة 6 بكسل والمسافة 6 بكسل) */
  animation: moveWave 4s linear infinite; /* تشغيل الحركة المستمرة */
}

/* الأنيمايشن السحري اللي بيخلي الخط يزحف ويمشي */
@keyframes moveWave {
  0% {
    stroke-dashoffset: 0;
  }
  100% {
    stroke-dashoffset: -120; /* يحرك النقط باتجاه الأمام */
  }
}

.step-img {
  width: 75%; /* أو 40px عشان تكون مناسبة لحجم الدائرة */
  height: auto;
  object-fit: contain;
}


/* تنسيق النصوص */
.step-item h3 {
  font-size: 18px;
  color: #111;
  margin-bottom: 10px;
}

.step-item p {
  font-size: 14px;
  color: #666;
  line-height: 1.6;
}
