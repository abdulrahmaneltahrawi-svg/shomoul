.process-section {

.icon-wrapper {

  justify-content: center;
  color: white;
  font-size: 28px;
  margin-bottom: 25px;
  border: 4px solid #0c0c0c;
}

.icon-wrapper:hover{
  transform: scale(1.1);
  transition: transform 0.1s ease;
  cursor: pointer
}


/* تنسيق النصوص */
